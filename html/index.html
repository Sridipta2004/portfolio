<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Portfolio</title>

<style>
/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    transition: 0.3s;
}

/* DARK MODE */
.dark {
    background:#121212;
    color:white;
}

header {
    background: linear-gradient(45deg, #007bff, #00c6ff);
    color:white;
    text-align:center;
    padding:30px;
}

nav {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    background:#222;
}

nav a {
    color:white;
    padding:15px;
    text-decoration:none;
}

nav a:hover {
    background:#007bff;
}

/* GRID LAYOUT */
.container {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
    gap:20px;
    padding:20px;
}

article {
    padding:20px;
    border-radius:15px;
    background:#f4f4f4;
    transition:0.3s;
}

.dark article { background:#1e1e1e; }

article:hover {
    transform: scale(1.05);
}

/* PROJECT CARDS */
.card {
    padding:15px;
    margin:10px 0;
    background:white;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.dark .card { background:#333; }

button {
    padding:10px;
    border:none;
    border-radius:5px;
    background:#007bff;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

button:hover {
    background:#0056b3;
}

footer {
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
}

/* FORM */
form {
    display:flex;
    flex-direction:column;
}

input, textarea {
    margin:10px 0;
    padding:10px;
    border-radius:5px;
    border:1px solid #ccc;
}

.error { color:red; font-size:13px; }

.success { color:green; }

</style>
</head>

<body>

<header>
    <h1>Advanced Portfolio</h1>
    <p>Interactive Web Developer Portfolio</p>
    <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
</nav>

<div class="container">

<article id="about">
    <h2>About Me</h2>
    <p>I build modern web applications using HTML, CSS & JavaScript.</p>
    <button onclick="showMessage()">Say Hello</button>
    <p id="msg"></p>
</article>

<article id="projects">
    <h2>Projects</h2>
    <div class="card">AI Chatbot</div>
    <div class="card">Portfolio Website</div>
    <div class="card">E-commerce App</div>
</article>

<article id="contact">
    <h2>Contact Me</h2>
    <form onsubmit="return validateForm()">
        <input type="text" id="name" placeholder="Name">
        <span id="nameError" class="error"></span>

        <input type="email" id="email" placeholder="Email">
        <span id="emailError" class="error"></span>

        <textarea id="message" placeholder="Message"></textarea>
        <span id="msgError" class="error"></span>

        <button type="submit">Send</button>
        <p id="successMsg" class="success"></p>
    </form>
</article>

</div>

<footer>
    <p>© 2026 Advanced Portfolio</p>
</footer>

<script>

// DARK MODE
function toggleDarkMode(){
    document.body.classList.toggle("dark");
}

// BUTTON
function showMessage(){
    document.getElementById("msg").innerText = "Welcome to my portfolio!";
}

// FORM VALIDATION
function validateForm(){
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let message = document.getElementById("message").value;
    let valid = true;

    if(name === ""){
        nameError.innerText = "Enter name";
        valid = false;
    } else nameError.innerText = "";

    if(email === "" || !email.includes("@")){
        emailError.innerText = "Enter valid email";
        valid = false;
    } else emailError.innerText = "";

    if(message === ""){
        msgError.innerText = "Enter message";
        valid = false;
    } else msgError.innerText = "";

    if(valid){
        successMsg.innerText = "Form Submitted Successfully!";
    }

    return false;
}

// EVENTS
header.addEventListener("mouseover", ()=>{
    header.style.background = "linear-gradient(45deg, red, orange)";
});

footer.addEventListener("click", ()=>{
    alert("Thanks for visiting!");
});

</script>

</body>
</html>
